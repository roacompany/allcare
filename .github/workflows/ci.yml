# Harness Engineering: V1(불변량 CI 강제)
# make verify를 CI에서 실행하여 머지 전 자동 검증

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls -d /Applications/Xcode_*.app 2>/dev/null
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Setup stub GoogleService-Info.plist
        run: |
          # gitignored 실제 plist 부재로 FirebaseApp.configure() 가 simulator
          # launch 시 abort. 단위 테스트는 Firebase 네트워크 호출 없음 — 구조만
          # 유효한 stub 로 충분 (build-gotchas.md "signal abrt" 섹션 참조).
          if [ ! -f BabyCare/GoogleService-Info.plist ]; then
            cat > BabyCare/GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>AIzaSyDUMMYCIKEYFORCIUNITTESTSONLY00</string>
            <key>BUNDLE_ID</key><string>com.roacompany.allcare</string>
            <key>CLIENT_ID</key><string>000000000000-ci.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.000000000000-ci</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:aaaaaaaaaaaaaaaa</string>
            <key>PROJECT_ID</key><string>ci-stub-project</string>
            <key>STORAGE_BUCKET</key><string>ci-stub-project.appspot.com</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
          </dict>
          </plist>
          PLIST
            echo "Wrote stub plist for CI"
          fi

      - name: Generate project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Resolve simulator
        id: sim
        run: |
          # iOS 26.2 는 "signal abrt before bootstrapping" documented bug
          # (rules/simulator-targets.md). 26.4 stable 이지만 macos-15 runner 미설치.
          # → iOS 18.x 만 사용 (26.x 전체 회피, runner 18.5/18.6 보유).
          # 키 포맷: "com.apple.CoreSimulator.SimRuntime.iOS-18-5" (하이픈).
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available -j | jq -r '
            .devices
            | to_entries
            | map(select(.key | test("iOS-18-")))
            | sort_by(.key) | reverse
            | map(.value[]
                | select(.isAvailable == true
                  and (.name | test("iPhone 1[5-9]|iPhone [2-9][0-9]"))))
            | .[0].udid // empty
          ')
          if [ -z "$UDID" ]; then
            echo "::error::No iOS 18.x iPhone simulator on runner (필요: rules/simulator-targets.md)"
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator UDID: $UDID"
          xcrun simctl list devices available -j | jq -r --arg u "$UDID" '
            .devices | to_entries[] | .key as $rt
            | .value[] | select(.udid == $u)
            | "Selected: \(.name) on \($rt)"'

      - name: Build
        run: |
          xcodebuild build \
            -project BabyCare.xcodeproj \
            -scheme BabyCare \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -quiet

      - name: Lint
        run: bash scripts/harness_lint.sh

      - name: Architecture test
        run: bash scripts/arch_test.sh

      - name: Test
        id: test
        run: |
          # -quiet 제거: host app crash 시 실제 stack trace 보기 위함
          # -resultBundlePath: .xcresult 캡처 → artifact 업로드로 crash report 분석
          xcodebuild test \
            -project BabyCare.xcodeproj \
            -scheme BabyCare \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:BabyCareTests \
            -resultBundlePath ci-test.xcresult \
            2>&1 | tee test.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit ${PIPESTATUS[0]}

      - name: Capture simulator crash logs
        if: failure() && steps.test.conclusion == 'failure'
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          mkdir -p crash-logs
          # Diagnostics 디렉토리에서 BabyCare crash report 추출
          DIAG_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [ -d "$DIAG_DIR" ]; then
            cp "$DIAG_DIR"/BabyCare* crash-logs/ 2>/dev/null || true
          fi
          # 시뮬레이터 내부 crash report
          SIM_DIAG="$HOME/Library/Developer/CoreSimulator/Devices/$UDID/data/Library/Logs/CrashReporter"
          if [ -d "$SIM_DIAG" ]; then
            find "$SIM_DIAG" -name "BabyCare*" -exec cp {} crash-logs/ \; 2>/dev/null || true
          fi
          ls -la crash-logs/ || echo "No crash logs found"

      - name: Upload test artifacts
        if: failure() && steps.test.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-failure
          path: |
            ci-test.xcresult
            test.log
            crash-logs/
          retention-days: 7
