# Harness Engineering: V1(불변량 CI 강제)
# make verify를 CI에서 실행하여 머지 전 자동 검증

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls -d /Applications/Xcode_*.app 2>/dev/null
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Generate project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Resolve simulator
        id: sim
        run: |
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available -j | jq -r '
            .devices
            | to_entries
            | map(select(.key | test("iOS|com.apple.CoreSimulator.SimRuntime.iOS")))
            | sort_by(.key) | reverse
            | map(.value[]
                | select(.isAvailable == true
                  and (.name | test("iPhone 1[5-9]|iPhone [2-9][0-9]"))))
            | .[0].udid // empty
          ')
          if [ -z "$UDID" ]; then
            echo "::error::No suitable iPhone simulator found on runner"
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator UDID: $UDID"

      - name: Build
        run: |
          xcodebuild build \
            -project BabyCare.xcodeproj \
            -scheme BabyCare \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -quiet

      - name: Lint
        run: bash scripts/harness_lint.sh

      - name: Architecture test
        run: bash scripts/arch_test.sh

      - name: Test
        run: |
          xcodebuild test \
            -project BabyCare.xcodeproj \
            -scheme BabyCare \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:BabyCareTests \
            -quiet
