# hy worktree м„Өм •.
# .dev/local.jsonмқҖ ignoredмқҙм§Җл§Ң .dev/config.ymlмқҖ commitлҗЁ (нҢҖ/м„ём…ҳ кіөмң ).
worktree:
  base_dir: ".worktrees/{name}"
  # worktree мғқм„ұ мӢң mainм—җм„ң ліөмӮ¬н•  ignored нҢҢмқјл“Ө.
  # лҲ„лқҪ мӢң мҰүмӢң crash л°ңмғқн•ҳлҠ” secret/config нҢҢмқј лӘ…мӢң:
  # - GoogleService-Info.plist: FirebaseApp.configure() мӢӨнҢЁ мӢң 'com.firebase.core' мҳҲмҷёлЎң мҰүмӢң crash
  copy_files:
    - "BabyCare/GoogleService-Info.plist"
  # hy go <name> нӣ„ мӢӨн–ү лӘ…л №
  post_command: "claude"
