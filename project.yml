name: BabyCare
options:
  bundleIdPrefix: com.roacompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "R24J6R4S7X"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "7"
    INFOPLIST_KEY_CFBundleDisplayName: "베이비케어"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    version: "11.0.0"

targets:
  BabyCare:
    type: application
    platform: iOS
    sources:
      - path: BabyCare
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - sdk: WidgetKit.framework
      - target: BabyCareWidgetExtension
    entitlements:
      path: BabyCare/BabyCare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Automatic"
    info:
      path: BabyCare/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - babycare
            CFBundleURLName: com.roacompany.allcare.deeplink
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  BabyCareWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BabyCareWidget
      - path: BabyCare/Services/WidgetDataStore.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: BabyCareWidget/BabyCareWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare.widget
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "올케어 위젯"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: BabyCareWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BabyCareTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabyCareTests
    dependencies:
      - target: BabyCare
