name: BabyCare
options:
  bundleIdPrefix: com.roacompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "R24J6R4S7X"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "2.8.4"
    CURRENT_PROJECT_VERSION: "80"
    INFOPLIST_KEY_CFBundleDisplayName: "베이비케어"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    version: "11.9.0"

targets:
  BabyCare:
    type: application
    platform: iOS
    sources:
      - path: BabyCare
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseRemoteConfig
      - sdk: WidgetKit.framework
      - target: BabyCareWidgetExtension
    entitlements:
      path: BabyCare/BabyCare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BabyCare AppStore"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Automatic"
    info:
      path: BabyCare/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        NSSupportsLiveActivities: true
        CFBundleLocalizations:
          - ko
        ITSAppUsesNonExemptEncryption: false
        LSApplicationQueriesSchemes:
          - coupang
        NSCalendarsFullAccessUsageDescription: "병원 방문 및 예방접종 일정을 캘린더에 추가하기 위해 접근 권한이 필요합니다."
        NSMicrophoneUsageDescription: "아기 울음 분석을 위해 마이크 접근 권한이 필요합니다. 녹음은 기기 내에서만 처리되며 외부로 전송되지 않습니다."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - babycare
            CFBundleURLName: com.roacompany.allcare.deeplink
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  BabyCareWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BabyCareWidget
      - path: BabyCare/Services/WidgetDataStore.swift
      - path: BabyCare/Models/FeedingTimerAttributes.swift
      - path: BabyCare/Utils/PregnancyDateMath.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: BabyCareWidget/BabyCareWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare.widget
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BabyCare Widget AppStore"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: "올케어 위젯"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "2.8.4"
        CURRENT_PROJECT_VERSION: "80"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: BabyCareWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BabyCareTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: BabyCareTests
    dependencies:
      - target: BabyCare

  BabyCareUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: BabyCareUITests
    dependencies:
      - target: BabyCare

schemes:
  BabyCare:
    build:
      targets:
        BabyCare: all
    run:
      config: Debug
      storeKitConfiguration: BabyCare/BabyCare.storekit
      commandLineArguments:
        "-FIRDebugEnabled": true
    test:
      config: Debug
      targets:
        - BabyCareTests
        - BabyCareUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
