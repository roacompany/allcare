          - coupang
        NSCalendarsFullAccessUsageDescription: "병원 방문 및 예방접종 일정을 캘린더에 추가하기 위해 접근 권한이 필요합니다."
        NSMicrophoneUsageDescription: "아기 울음 분석을 위해 마이크 접근 권한이 필요합니다. 녹음은 기기 내에서만 처리되며 외부로 전송되지 않습니다."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - babycare
            CFBundleURLName: com.roacompany.allcare.deeplink
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  BabyCareWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BabyCareWidget
      - path: BabyCare/Services/WidgetDataStore.swift
      - path: BabyCare/Models/FeedingTimerAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: BabyCareWidget/BabyCareWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare.widget
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: "올케어 위젯"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "2.7.0"
        CURRENT_PROJECT_VERSION: "52"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: BabyCareWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BabyCareTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: BabyCareTests
    dependencies:
      - target: BabyCare

  BabyCareUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: BabyCareUITests
    dependencies:
      - target: BabyCare

schemes:
  BabyCare:
    build:
      targets:
        BabyCare: all
    run:
      config: Debug
      storeKitConfiguration: BabyCare/BabyCare.storekit
      commandLineArguments:
        "-FIRDebugEnabled": true
    test:
      config: Debug
      targets:
        - BabyCareTests
        - BabyCareUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
