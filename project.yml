name: BabyCare
options:
  bundleIdPrefix: com.roacompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "R24J6R4S7X"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "2.7.0"
    CURRENT_PROJECT_VERSION: "52"
    INFOPLIST_KEY_CFBundleDisplayName: "베이비케어"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    version: "11.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "13.2.0"

targets:
  BabyCare:
    type: application
    platform: iOS
    sources:
      - path: BabyCare
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseAnalytics
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - sdk: WidgetKit.framework
      - target: BabyCareWidgetExtension
    entitlements:
      path: BabyCare/BabyCare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.roacompany.allcare
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roacompany.allcare
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Automatic"
    info:
      path: BabyCare/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        NSSupportsLiveActivities: true
        CFBundleLocalizations:
          - ko
        ITSAppUsesNonExemptEncryption: false
        GADApplicationIdentifier: "ca-app-pub-6369815556964095~1504777334"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
